name: "Terraform Apply (Beta and Prod)"

on:
  push:
    branches:
      - main

env:
  TF_ACTIONS_WORKING_DIR: "./stack"

permissions:
  pull-requests: write

jobs:
  apply-beta:
    name: "Apply to Beta"
    runs-on: ubuntu-latest
    permissions: # granular permissions
      # so GitHub can check out this repo using the default github.token
      contents: read
    environment: terraform # beta environment

    defaults:
      run:
        working-directory: ${{ env.TF_ACTIONS_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: "Configure AWS credentials (beta)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: "Get AWS Account ID and configure backend"
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="fryrank-app-terraform-state-${ACCOUNT_ID}"
          echo "Using bucket: $BUCKET_NAME"
          echo "bucket=\"$BUCKET_NAME\"" >> backend.hcl

      - name: "Terraform Init"
        run: "terraform init -backend-config=backend.hcl"

      - name: "Discover CloudFront Web ACL (beta)"
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          
          # Find the CloudFront distribution tagged with value 'fryrank-app'
          DIST_ID=""
          for dist_id in $(aws cloudfront list-distributions --query "DistributionList.Items[].Id" --output text); do
            tag_key=$(aws cloudfront list-tags-for-resource --resource "arn:aws:cloudfront::${ACCOUNT_ID}:distribution/${dist_id}" --query "Tags.Items[?Value==\`fryrank-app\`].Key" --output text)
            if [ -n "$tag_key" ]; then
              DIST_ID="$dist_id"
              break
            fi
          done
          
          if [ -z "${DIST_ID}" ]; then
            echo "No CloudFront distribution found for this account. Please run terraform apply first to create the distribution."
            exit 1
          fi
          
          # Prefer the Web ACL already attached to the distribution (avoids picking the wrong one).
          WEB_ACL_ARN=""
          DIST_WEB_ACL="$(aws cloudfront get-distribution-config --id "${DIST_ID}" --query "DistributionConfig.WebACLId" --output text)"
          if [[ "${DIST_WEB_ACL}" != "None" && "${DIST_WEB_ACL}" != "null" && -n "${DIST_WEB_ACL}" ]]; then
            WEB_ACL_ARN="${DIST_WEB_ACL}"
          else
            WEB_ACL_ARN="$(aws wafv2 list-web-acls --region us-east-1 --scope CLOUDFRONT --query "WebACLs[?starts_with(Name, \`CreatedByCloudFront\`)] | [0].ARN" --output text)"
            if [[ "${WEB_ACL_ARN}" == "None" || "${WEB_ACL_ARN}" == "null" ]]; then
              WEB_ACL_ARN=""
            fi
          fi

          if [ -z "${WEB_ACL_ARN}" ]; then
            echo "Could not determine a Web ACL for the CloudFront distribution."
            exit 1
          fi

          # arn:.../webacl/<name>/<id>
          WEB_ACL_ID="${WEB_ACL_ARN##*/}"
          WEB_ACL_NAME="${WEB_ACL_ARN%/*}"
          WEB_ACL_NAME="${WEB_ACL_NAME##*/}"

          if [ -z "${WEB_ACL_ID}" ] || [ -z "${WEB_ACL_NAME}" ] || [ "${WEB_ACL_ID}" = "${WEB_ACL_ARN}" ]; then
            echo "Could not parse Web ACL name/ID from ARN: ${WEB_ACL_ARN}"
            exit 1
          fi

          echo "CLOUDFRONT_WEB_ACL_ARN=${WEB_ACL_ARN}" >> "$GITHUB_ENV"
          echo "CLOUDFRONT_WEB_ACL_ID=${WEB_ACL_ID}" >> "$GITHUB_ENV"
          echo "CLOUDFRONT_WEB_ACL_NAME=${WEB_ACL_NAME}" >> "$GITHUB_ENV"
          echo "TF_VAR_cloudfront_web_acl_arn=${WEB_ACL_ARN}" >> "$GITHUB_ENV"
          echo "TF_VAR_cloudfront_web_acl_name=${WEB_ACL_NAME}" >> "$GITHUB_ENV"

      - name: "Import CloudFront Web ACL into state (beta, if needed)"
        run: |
          set -euo pipefail
          if terraform state list aws_wafv2_web_acl.cloudfront_web_acl >/dev/null 2>&1; then
            echo "Web ACL already imported, skipping import step."
          else
            terraform import aws_wafv2_web_acl.cloudfront_web_acl "${CLOUDFRONT_WEB_ACL_ID}/${CLOUDFRONT_WEB_ACL_NAME}/CLOUDFRONT"
          fi

      - name: "Terraform Apply (beta)"
        run: "terraform apply -auto-approve -input=false"

  apply-prod:
    name: "Apply to Prod"
    runs-on: ubuntu-latest
    permissions: # granular permissions
      # so GitHub can check out this repo using the default github.token
      contents: read
    environment: terraform-prod # prod environment
    needs: apply-beta   # ensures beta finishes first

    defaults:
      run:
        working-directory: ${{ env.TF_ACTIONS_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: "Configure AWS credentials (prod)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: "Get AWS Account ID and configure backend"
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="fryrank-app-terraform-state-${ACCOUNT_ID}"
          echo "Using bucket: $BUCKET_NAME"
          echo "bucket=\"$BUCKET_NAME\"" >> backend.hcl

      - name: "Terraform Init"
        run: "terraform init -backend-config=backend.hcl"

      - name: "Discover CloudFront Web ACL (prod)"
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          
          # Find the CloudFront distribution tagged with value 'fryrank-app'
          DIST_ID=""
          for dist_id in $(aws cloudfront list-distributions --query "DistributionList.Items[].Id" --output text); do
            tag_key=$(aws cloudfront list-tags-for-resource --resource "arn:aws:cloudfront::${ACCOUNT_ID}:distribution/${dist_id}" --query "Tags.Items[?Value==\`fryrank-app\`].Key" --output text)
            if [ -n "$tag_key" ]; then
              DIST_ID="$dist_id"
              break
            fi
          done
          
          if [ -z "${DIST_ID}" ]; then
            echo "No CloudFront distribution found for this account. Please run terraform apply first to create the distribution."
            exit 1
          fi
          
          # Prefer the Web ACL already attached to the distribution (avoids picking the wrong one).
          WEB_ACL_ARN=""
          DIST_WEB_ACL="$(aws cloudfront get-distribution-config --id "${DIST_ID}" --query "DistributionConfig.WebACLId" --output text)"
          if [[ "${DIST_WEB_ACL}" != "None" && "${DIST_WEB_ACL}" != "null" && -n "${DIST_WEB_ACL}" ]]; then
            WEB_ACL_ARN="${DIST_WEB_ACL}"
          else
            WEB_ACL_ARN="$(aws wafv2 list-web-acls --region us-east-1 --scope CLOUDFRONT --query "WebACLs[?starts_with(Name, \`CreatedByCloudFront\`)] | [0].ARN" --output text)"
            if [[ "${WEB_ACL_ARN}" == "None" || "${WEB_ACL_ARN}" == "null" ]]; then
              WEB_ACL_ARN=""
            fi
          fi

          if [ -z "${WEB_ACL_ARN}" ]; then
            echo "Could not determine a Web ACL for the CloudFront distribution."
            exit 1
          fi

          # arn:.../webacl/<name>/<id>
          WEB_ACL_ID="${WEB_ACL_ARN##*/}"
          WEB_ACL_NAME="${WEB_ACL_ARN%/*}"
          WEB_ACL_NAME="${WEB_ACL_NAME##*/}"

          if [ -z "${WEB_ACL_ID}" ] || [ -z "${WEB_ACL_NAME}" ] || [ "${WEB_ACL_ID}" = "${WEB_ACL_ARN}" ]; then
            echo "Could not parse Web ACL name/ID from ARN: ${WEB_ACL_ARN}"
            exit 1
          fi

          echo "CLOUDFRONT_WEB_ACL_ARN=${WEB_ACL_ARN}" >> "$GITHUB_ENV"
          echo "CLOUDFRONT_WEB_ACL_ID=${WEB_ACL_ID}" >> "$GITHUB_ENV"
          echo "CLOUDFRONT_WEB_ACL_NAME=${WEB_ACL_NAME}" >> "$GITHUB_ENV"
          echo "TF_VAR_cloudfront_web_acl_arn=${WEB_ACL_ARN}" >> "$GITHUB_ENV"
          echo "TF_VAR_cloudfront_web_acl_name=${WEB_ACL_NAME}" >> "$GITHUB_ENV"

      - name: "Import CloudFront Web ACL into state (prod, if needed)"
        run: |
          set -euo pipefail
          if terraform state list aws_wafv2_web_acl.cloudfront_web_acl >/dev/null 2>&1; then
            echo "Web ACL already imported, skipping import step."
          else
            terraform import aws_wafv2_web_acl.cloudfront_web_acl "${CLOUDFRONT_WEB_ACL_ID}/${CLOUDFRONT_WEB_ACL_NAME}/CLOUDFRONT"
          fi

      - name: "Terraform Apply (prod)"
        run: "terraform apply -auto-approve -input=false"
